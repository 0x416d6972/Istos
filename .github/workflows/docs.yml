name: Deploy Docs

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv python install 3.12
      - run: uv sync --group dev
      - run: uv run mkdocs gh-deploy --force
